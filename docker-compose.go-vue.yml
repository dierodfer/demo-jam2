# Levanta el backend Go (8081) y el frontend Vue (5174).
#
#   docker compose -f docker-compose.yml -f docker-compose.go-vue.yml up --build
#
# El servicio postgres viene de docker-compose.yml (compartido con el stack Java+React).

services:
  backend-go:
    build: ./backend-go
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: "8081"
      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_NAME: "${DB_NAME:-portal}"
      DB_USER: "${DB_USER:-portal}"
      DB_PASSWORD: "${DB_PASSWORD:-portal}"
      MIGRATIONS_PATH: "/migrations"
      CORS_ALLOWED_ORIGIN: "http://localhost:5174"
      SEED_USERNAME: "admin"
    volumes:
      - ./shared/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy

  frontend-vue:
    build:
      context: ./frontend-vue
      args:
        # Se hornea en el build estático (nginx). El navegador (host) habla
        # con el backend directamente por su puerto publicado.
        VITE_API_BASE: "http://localhost:8081"
    ports:
      - "5174:5174"
    depends_on:
      - backend-go
