# Levanta el backend Go (8081) y el frontend Vue (5174).
#
#   docker compose -f docker-compose.go-vue.yml up --build
#
# Monta el MISMO ./data que el stack Java+React, por lo que ambos backends
# leen y escriben el mismo portal.db.

services:
  backend-go:
    build: ./backend-go
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: "8081"
      PORTAL_DB_PATH: "/data/portal.db"
      CORS_ALLOWED_ORIGIN: "http://localhost:5174"
      SEED_USERNAME: "admin"
    volumes:
      - ./data:/data

  # ⛏ PENDIENTE: se activará cuando integremos el portal Vue.
  # Descomenta este bloque cuando exista frontend-vue/Dockerfile.
  #
  # frontend-vue:
  #   build: ./frontend-vue
  #   ports:
  #     - "5174:5174"
  #   environment:
  #     # El navegador (host) habla con el backend por el puerto publicado.
  #     VITE_API_BASE: "http://localhost:8081"
  #   depends_on:
  #     - backend-go
