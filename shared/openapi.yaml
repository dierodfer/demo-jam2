openapi: 3.1.0
info:
  title: Portal de Empleado API
  version: "1.0.0"
  description: >
    Contrato de API común para el Portal de Empleado. Este mismo contrato lo
    implementan de forma independiente el backend Java (puerto 8080) y el
    backend Go (puerto 8081). Cualquier frontend puede hablar con cualquier
    backend indistintamente porque ambos exponen exactamente las mismas rutas
    y el mismo JSON.

    Autenticación: login simulado. El username debe coincidir con el empleado
    sembrado en la base de datos; cualquier contraseña es válida. La sesión se
    mantiene mediante una cookie (JSESSIONID en Java, session_id en Go).

servers:
  - url: http://localhost:8080
    description: Backend Java
  - url: http://localhost:8081
    description: Backend Go

tags:
  - name: auth
    description: Login / logout simulado basado en sesión
  - name: profile
    description: Perfil del empleado autenticado
  - name: certificaciones
    description: Conocimientos / certificaciones del empleado (CRUD)

paths:
  /api/login:
    post:
      tags: [auth]
      summary: Inicia sesión (simulado)
      description: >
        Comprueba que el username coincida con el empleado sembrado. La
        contraseña se ignora (cualquier valor es válido). Si es correcto abre
        una sesión y devuelve la cookie de sesión.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login correcto. Se establece la cookie de sesión.
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Cookie de sesión (JSESSIONID o session_id).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Empleado'
        '401':
          description: Username desconocido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/me:
    get:
      tags: [profile]
      summary: Devuelve el perfil del empleado autenticado
      responses:
        '200':
          description: Perfil del empleado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Empleado'
        '401':
          description: No hay sesión activa.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      tags: [profile]
      summary: Actualiza el perfil del empleado autenticado
      description: >
        Actualiza los campos editables del perfil. El id se ignora en el
        cuerpo; siempre se actualiza el empleado de la sesión activa.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmpleadoUpdate'
      responses:
        '200':
          description: Perfil actualizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Empleado'
        '401':
          description: No hay sesión activa.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/logout:
    post:
      tags: [auth]
      summary: Cierra la sesión
      responses:
        '204':
          description: Sesión cerrada. La cookie de sesión queda invalidada.

  /api/certificaciones:
    get:
      tags: [certificaciones]
      summary: Lista los conocimientos / certificaciones del empleado autenticado
      responses:
        '200':
          description: Lista de certificaciones.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Certificacion'
        '401':
          description: No hay sesión activa.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags: [certificaciones]
      summary: Crea una certificación
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CertificacionInput'
      responses:
        '201':
          description: Certificación creada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Certificacion'
        '401':
          description: No hay sesión activa.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/certificaciones/{id}:
    put:
      tags: [certificaciones]
      summary: Actualiza una certificación
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CertificacionInput'
      responses:
        '200':
          description: Certificación actualizada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Certificacion'
        '401':
          description: No hay sesión activa.
        '404':
          description: No existe o no pertenece al empleado.
    delete:
      tags: [certificaciones]
      summary: Elimina una certificación
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Certificación eliminada.
        '401':
          description: No hay sesión activa.
        '404':
          description: No existe o no pertenece al empleado.

components:
  schemas:
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          description: Se ignora (cualquier valor es válido).
          example: cualquier-cosa

    Empleado:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        nombre:
          type: string
          example: Ana García
        email:
          type: string
          example: ana.garcia@empresa.com
        telefono:
          type: string
          example: "+34 600 123 456"
        puesto:
          type: string
          example: Desarrolladora Full Stack
        departamento:
          type: string
          example: Tecnología
        direccion:
          type: string
          example: Calle Mayor 1, 28013 Madrid
        foto:
          type: string
          description: URL o data URI de la foto de perfil.
          example: https://i.pravatar.cc/300?u=ana

    EmpleadoUpdate:
      type: object
      description: Campos editables del perfil (los 7 campos, sin id).
      properties:
        nombre:
          type: string
        email:
          type: string
        telefono:
          type: string
        puesto:
          type: string
        departamento:
          type: string
        direccion:
          type: string
        foto:
          type: string

    Certificacion:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        conocimiento:
          type: string
          example: AWS Certified Developer – Associate
        empresaEmisora:
          type: string
          example: AWS
        fecha:
          type: string
          description: Fecha de emisión (YYYY-MM-DD).
          example: "2025-11-17"

    CertificacionInput:
      type: object
      description: Campos editables de una certificación (sin id).
      required: [conocimiento]
      properties:
        conocimiento:
          type: string
        empresaEmisora:
          type: string
        fecha:
          type: string
          example: "2025-11-17"

    Error:
      type: object
      properties:
        error:
          type: string
          example: No autenticado
