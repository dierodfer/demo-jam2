# Sirve el build estático del frontend React en el MISMO puerto (5173) que
# usaba el servidor de desarrollo, para que nada cambie de cara al usuario.
server {
    listen 5173;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: cualquier ruta desconocida vuelve al index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
