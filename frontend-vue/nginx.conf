# Sirve el build estático del frontend Vue en el MISMO puerto (5174) que
# usaba el servidor de desarrollo, para que nada cambie de cara al usuario.
server {
    listen 5174;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: cualquier ruta desconocida vuelve al index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
