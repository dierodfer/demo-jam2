# Levanta el backend Java (8080) y el frontend React (5173).
#
#   docker compose -f docker-compose.java-react.yml up --build
#
# Monta ./data como volumen para compartir el mismo portal.db con el stack Go+Vue.

services:
  backend-java:
    build: ./backend-java
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: "8080"
      PORTAL_DB_PATH: "/data/portal.db"
      CORS_ALLOWED_ORIGIN: "http://localhost:5173"
      SEED_USERNAME: "admin"
    volumes:
      - ./data:/data

  frontend-react:
    build: ./frontend-react
    ports:
      - "5173:5173"
    environment:
      # El navegador (host) habla con el backend por el puerto publicado.
      VITE_API_BASE: "http://localhost:8080"
    depends_on:
      - backend-java
