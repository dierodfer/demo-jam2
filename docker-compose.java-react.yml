# Levanta el backend Java (8080) y el frontend React (5173).
#
#   docker compose -f docker-compose.yml -f docker-compose.java-react.yml up --build
#
# El servicio postgres viene de docker-compose.yml (compartido con el stack Go+Vue).

services:
  backend-java:
    build: ./backend-java
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: "8080"
      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_NAME: "${DB_NAME:-portal}"
      DB_USER: "${DB_USER:-portal}"
      DB_PASSWORD: "${DB_PASSWORD:-portal}"
      MIGRATIONS_PATH: "/migrations"
      CORS_ALLOWED_ORIGIN: "http://localhost:5173"
      SEED_USERNAME: "admin"
    volumes:
      - ./shared/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy

  frontend-react:
    build:
      context: ./frontend-react
      args:
        # Se hornea en el build estático (nginx). El navegador (host) habla
        # con el backend directamente por su puerto publicado.
        VITE_API_BASE: "http://localhost:8080"
    ports:
      - "5173:5173"
    depends_on:
      - backend-java
