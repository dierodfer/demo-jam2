spring.application.name=portal-empleado-backend-java

# Puerto
server.port=${SERVER_PORT:8080}

# SQLite compartido con el backend Go (./data/portal.db).
# WAL + busy_timeout permiten que ambos backends escriban el mismo fichero
# sin errores "database is locked".
spring.datasource.url=jdbc:sqlite:${PORTAL_DB_PATH:../data/portal.db}?journal_mode=WAL&busy_timeout=5000
spring.datasource.driver-class-name=org.sqlite.JDBC

# Hibernate / JPA con dialecto de la comunidad para SQLite.
# El esquema NO lo crea Hibernate: lo crean las migraciones de shared/migrations
# (ver MigrationRunner), la única fuente de verdad compartida con el backend Go.
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.globally_quoted_identifiers=false
spring.jpa.open-in-view=false

# Una sola conexión por proceso (SQLite admite un escritor a la vez)
spring.datasource.hikari.maximum-pool-size=1

# Directorio de migraciones SQL compartidas con el backend Go
app.migrations.path=${MIGRATIONS_PATH:../shared/migrations}

# CORS: origen del frontend React (configurable)
app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:5173}

# Username sembrado que se acepta en el login simulado
app.seed.username=${SEED_USERNAME:admin}
