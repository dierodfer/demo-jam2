spring.application.name=portal-empleado-backend-java

# Puerto
server.port=${SERVER_PORT:8080}

# PostgreSQL compartido con el backend Go (mismo contenedor/servicio postgres)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:portal}
spring.datasource.username=${DB_USER:portal}
spring.datasource.password=${DB_PASSWORD:portal}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA con el dialecto de Postgres (incluido en Hibernate, sin dependencia extra).
# El esquema NO lo crea Hibernate: lo crean las migraciones de shared/migrations
# (ver MigrationRunner), la única fuente de verdad compartida con el backend Go.
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# Si el contenedor de Postgres tarda unos segundos en arrancar, reintenta en
# vez de fallar rápido (útil sobre todo en `make dev` sin depends_on de Docker).
spring.datasource.hikari.initialization-fail-timeout=60000

# CORS: origen del frontend React (configurable)
app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:5173}

# Username sembrado que se acepta en el login simulado
app.seed.username=${SEED_USERNAME:admin}

# Directorio de migraciones SQL compartidas con el backend Go
app.migrations.path=${MIGRATIONS_PATH:../shared/migrations}
