spring.application.name=portal-empleado-backend-java

# Puerto
server.port=${SERVER_PORT:8080}

# SQLite compartido con el backend Go (./data/portal.db)
spring.datasource.url=jdbc:sqlite:${PORTAL_DB_PATH:../data/portal.db}
spring.datasource.driver-class-name=org.sqlite.JDBC

# Hibernate / JPA con dialecto de la comunidad para SQLite
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.globally_quoted_identifiers=false
spring.jpa.open-in-view=false

# SQLite es monousuario: un solo pool para evitar "database is locked"
spring.datasource.hikari.maximum-pool-size=1

# CORS: origen del frontend React (configurable)
app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:5173}

# Username sembrado que se acepta en el login simulado
app.seed.username=${SEED_USERNAME:admin}
